name: tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnostics (emit as annotations for public visibility)
        if: always()
        env:
          PYTHONPATH: src
        run: |
          emit() {
            # GitHub Actions annotation, multi-line via URL-encoded newlines.
            python3 -c "import sys; s=sys.stdin.read(); print('::error title=' + sys.argv[1] + '::' + s.replace('%','%25').replace('\r','%0D').replace('\n','%0A')[:60000])" "$1"
          }
          { python --version; pip list; } 2>&1 | emit "env: python + pip list"
          { python -c "import aiv_dse" && echo OK || true
            python -c "import aiv_dse.graph" && echo OK || true
            python -c "import langgraph" && echo OK || true
          } 2>&1 | emit "import check"
          pytest tests/ --collect-only -q 2>&1 | tail -200 | emit "pytest --collect-only"

      - name: Run pytest
        env:
          PYTHONPATH: src
        run: |
          set -o pipefail
          if ! pytest tests/ -v --tb=long 2>&1 | tee pytest_output.txt; then
            tail -200 pytest_output.txt | python3 -c "import sys; s=sys.stdin.read(); print('::error title=pytest output::' + s.replace('%','%25').replace('\r','%0D').replace('\n','%0A')[:60000])"
            exit 1
          fi
